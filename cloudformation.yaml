AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Infrastructure for AI Shopping Agent blog post (uksb-c1m594zkj0).
  Creates a VPC with public/private subnets, NAT gateway, an EC2 instance
  bootstrapped via cfn-init, optional OpenSearch Service domain, and all required IAM roles.

  Multi-Region Support: This template can be deployed to any AWS region that supports
  the required services (Bedrock, AgentCore, OpenSearch Service, VPC, EC2, ALB).
  Uses AWS::Region and AWS::AccountId pseudo parameters for portability.

# ============================================================================
# Parameters
# ============================================================================
Parameters:
  InstanceType:
    Type: String
    Default: t3.medium
    Description: EC2 instance type for demo
    AllowedValues:
      - t3.small
      - t3.medium
      - t2.small
      - t2.medium

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Amazon Linux 2023 AMI (auto-resolved via SSM parameter)

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC

  PublicSubnet1Cidr:
    Type: String
    Default: 10.0.0.0/24
    Description: CIDR block for public subnet 1 (NAT gateway and ALB)

  PublicSubnet2Cidr:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for public subnet 2 (ALB)

  PrivateSubnetCidr:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for the private subnet (EC2 instance)

  CreateOpenSearchDomain:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Create a new OpenSearch Service domain? (Choose 'false' to use an existing domain)

  OpenSearchDomainName:
    Type: String
    Default: shopping-agent-search
    Description: OpenSearch domain name (will be created if CreateOpenSearchDomain=true, or specify existing domain name)
    MinLength: 1

  OpenSearchVolumeSize:
    Type: Number
    Default: 20
    MinValue: 10
    MaxValue: 100
    Description: EBS volume size in GB per node (only used if creating new domain)

  OpenSearchAdminUsername:
    Type: String
    Default: admin
    Description: Admin username for OpenSearch Dashboards access (only used if creating new domain)
    MinLength: 1
    MaxLength: 16
    AllowedPattern: ^[a-z][a-z0-9]*$
    ConstraintDescription: Must start with a lowercase letter and contain only lowercase letters and numbers

  OpenSearchAdminPassword:
    Type: String
    NoEcho: true
    Default: Admin123!
    Description: Admin password for OpenSearch Dashboards (only used if creating new domain, min 8 chars with uppercase, lowercase, number, special char)
    MinLength: 8
    AllowedPattern: ^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}
    ConstraintDescription: Must be at least 8 characters with uppercase, lowercase, number, and special character

# ============================================================================
# Conditions
# ============================================================================
Conditions:
  ShouldCreateOpenSearchDomain: !Equals [!Ref CreateOpenSearchDomain, 'true']

# ============================================================================
# Resources
# ============================================================================
Resources:

  # --------------------------------------------------------------------------
  # OpenSearch Service Domain (Optional)
  # --------------------------------------------------------------------------
  OpenSearchDomain:
    Type: AWS::Elasticsearch::Domain
    Condition: ShouldCreateOpenSearchDomain
    Properties:
      DomainName: !Ref OpenSearchDomainName
      ElasticsearchVersion: OpenSearch_3.5
      ElasticsearchClusterConfig:
        InstanceType: t3.medium.elasticsearch
        InstanceCount: 2
        DedicatedMasterEnabled: false
        ZoneAwarenessEnabled: false
      EBSOptions:
        EBSEnabled: true
        VolumeType: gp3
        VolumeSize: !Ref OpenSearchVolumeSize
      AccessPolicies:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: '*'
            Action: 'es:*'
            Resource: !Sub 'arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/${OpenSearchDomainName}/*'
      AdvancedSecurityOptions:
        Enabled: true
        InternalUserDatabaseEnabled: true
        MasterUserOptions:
          MasterUserName: !Ref OpenSearchAdminUsername
          MasterUserPassword: !Ref OpenSearchAdminPassword
      NodeToNodeEncryptionOptions:
        Enabled: true
      EncryptionAtRestOptions:
        Enabled: true
      DomainEndpointOptions:
        EnforceHTTPS: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-opensearch

  # --------------------------------------------------------------------------
  # VPC
  # --------------------------------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-igw

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # --------------------------------------------------------------------------
  # Public Subnets (for NAT Gateway and ALB)
  # --------------------------------------------------------------------------
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public-subnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public-subnet-2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # --------------------------------------------------------------------------
  # NAT Gateway
  # --------------------------------------------------------------------------
  NatEip:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-nat-eip

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-nat

  # --------------------------------------------------------------------------
  # Private Subnet (for EC2 instance)
  # --------------------------------------------------------------------------
  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-private-subnet

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-private-rt

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable

  # --------------------------------------------------------------------------
  # Security Groups
  # --------------------------------------------------------------------------
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for internal Application Load Balancer
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref VpcCidr
          Description: HTTP access from within VPC (CloudFront VPC Origin)
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-alb-sg

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for the EC2 instance
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS egress for AWS services
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP egress for package downloads
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-ec2-sg

  # Security Group Rules (to avoid circular dependency)
  ALBToEC2EgressRule:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref ALBSecurityGroup
      IpProtocol: tcp
      FromPort: 8501
      ToPort: 8501
      DestinationSecurityGroupId: !Ref EC2SecurityGroup
      Description: Forward to Streamlit on EC2

  EC2FromALBIngressRule:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EC2SecurityGroup
      IpProtocol: tcp
      FromPort: 8501
      ToPort: 8501
      SourceSecurityGroupId: !Ref ALBSecurityGroup
      Description: Streamlit access from ALB only

  # --------------------------------------------------------------------------
  # IAM Role: OpenSearchBedrockEmbeddingRole
  # --------------------------------------------------------------------------
  OpenSearchBedrockEmbeddingRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub OpenSearchBedrockEmbeddingRole-${AWS::Region}
      Description: Allows OpenSearch Service to invoke Bedrock Nova Multimodal Embeddings model
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: Statement1
            Effect: Allow
            Principal:
              Service: opensearchservice.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: OpenSearchBedrockEmbeddingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: Statement1
                Effect: Allow
                Action:
                  - bedrock:InvokeAgent
                  - bedrock:InvokeModel
                Resource:
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/*

  # --------------------------------------------------------------------------
  # IAM Role: EC2 Instance Role
  # --------------------------------------------------------------------------
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-EC2Role
      Description: EC2 instance role with all permissions to run the shopping agent scripts
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/AmazonBedrockLimitedAccess
      Policies:
        - PolicyName: PassOpenSearchBedrockEmbeddingRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt OpenSearchBedrockEmbeddingRole.Arn

        - PolicyName: AgentCoreAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: BedrockAgentCoreServiceAccess
                Effect: Allow
                Action:
                  - bedrock-agentcore:*
                Resource: '*'
              - Sid: ECRAuthorizationToken
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: '*'
              - Sid: ECRRepositoryAccess
                Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:DescribeRepositories
                  - ecr:CreateRepository
                  - ecr:ListImages
                  - ecr:DescribeImages
                Resource:
                  - !Sub arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/bedrock-agentcore-*
              - Sid: CodeBuildProjectAccess
                Effect: Allow
                Action:
                  - codebuild:CreateProject
                  - codebuild:UpdateProject
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                  - codebuild:DeleteProject
                Resource:
                  - !Sub arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/bedrock-agentcore-*
              - Sid: IAMRoleManagement
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:AttachRolePolicy
                  - iam:PutRolePolicy
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:PassRole
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:CreateServiceLinkedRole
                Resource:
                  - !Sub arn:aws:iam::${AWS::AccountId}:role/AmazonBedrockAgentCoreSDKRuntime-*
                  - !Sub arn:aws:iam::${AWS::AccountId}:role/AmazonBedrockAgentCoreSDKCodeBuild-*
                  - !Sub arn:aws:iam::${AWS::AccountId}:role/aws-service-role/runtime-identity.bedrock-agentcore.amazonaws.com/AWSServiceRoleForBedrockAgentCoreRuntimeIdentity
              - Sid: CloudWatchLogsAccess
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:PutResourcePolicy
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/*
              - Sid: CloudWatchLogsResourcePolicy
                Effect: Allow
                Action:
                  - logs:PutResourcePolicy
                Resource: '*'
              - Sid: S3BucketManagement
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:PutBucketPolicy
                  - s3:PutBucketVersioning
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutLifecycleConfiguration
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::bedrock-agentcore-codebuild-sources-${AWS::AccountId}-*
                  - !Sub arn:aws:s3:::bedrock-agentcore-codebuild-sources-${AWS::AccountId}-*/*

        - PolicyName: OpenSearchAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: OpenSearchHTTPAccess
                Effect: Allow
                Action:
                  - es:ESHttpGet
                  - es:ESHttpPost
                  - es:ESHttpPut
                Resource:
                  - !Sub arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/${OpenSearchDomainName}/*

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  # --------------------------------------------------------------------------
  # Application Load Balancer
  # --------------------------------------------------------------------------
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Type: application
      Scheme: internal
      IpAddressType: ipv4
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-alb

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: 8501
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: instance
      HealthCheckEnabled: true
      HealthCheckPath: /_stcore/health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200
      Targets:
        - Id: !Ref EC2Instance
          Port: 8501
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-streamlit-tg

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  # --------------------------------------------------------------------------
  # EC2 Instance with cfn-init and cfn-signal
  # --------------------------------------------------------------------------
  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn: PrivateRoute
    CreationPolicy:
      ResourceSignal:
        Count: 1
        Timeout: PT15M
    Metadata:
      AWS::CloudFormation::Init:
        configSets:
          default:
            - install_packages
            - setup_workspace
            - install_pip_deps
        install_packages:
          packages:
            yum:
              python3.11: []
              python3.11-pip: []
              git: []
        setup_workspace:
          commands:
            01_create_dir:
              command: mkdir -p /home/ec2-user/shopping-agent
          files:
            /home/ec2-user/shopping-agent/requirements.txt:
              content: |
                boto3
                opensearch-py
                requests-aws4auth
                requests
                streamlit
                uv
                strands-agents
                strands-agents-tools
                bedrock-agentcore<=0.1.5
                bedrock-agentcore-starter-toolkit==0.1.14
              mode: '000644'
              owner: ec2-user
              group: ec2-user
        install_pip_deps:
          commands:
            01_install_requirements:
              command: python3.11 -m pip install -r /home/ec2-user/shopping-agent/requirements.txt
            02_set_ownership:
              command: chown -R ec2-user:ec2-user /home/ec2-user/shopping-agent
    Properties:
      InstanceType: !Ref InstanceType
      EbsOptimized: true
      ImageId: !Ref LatestAmiId
      IamInstanceProfile: !Ref EC2InstanceProfile
      SubnetId: !Ref PrivateSubnet
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-agent-instance
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          /opt/aws/bin/cfn-init -v \
            --stack ${AWS::StackName} \
            --resource EC2Instance \
            --configsets default \
            --region ${AWS::Region}

          /opt/aws/bin/cfn-signal -e $? \
            --stack ${AWS::StackName} \
            --resource EC2Instance \
            --region ${AWS::Region}

  # --------------------------------------------------------------------------
  # Cognito User Pool (Authentication)
  # --------------------------------------------------------------------------
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${AWS::StackName}-user-pool
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: CognitoUserPoolDomain
    Properties:
      ClientName: !Sub ${AWS::StackName}-app-client
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AllowedOAuthFlows:
        - implicit
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - https://localhost/callback
      LogoutURLs:
        - https://localhost/logout

  # Custom Resource to update Cognito callback URL with CloudFront domain
  UpdateCognitoCallbackFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-update-cognito-callback
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt UpdateCognitoCallbackRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          def handler(event, context):
              try:
                  if event['RequestType'] in ['Create', 'Update']:
                      client = boto3.client('cognito-idp')
                      user_pool_id = event['ResourceProperties']['UserPoolId']
                      client_id = event['ResourceProperties']['ClientId']
                      cf_domain = event['ResourceProperties']['CloudFrontDomain']
                      callback_url = f'https://{cf_domain}/'
                      client.update_user_pool_client(
                          UserPoolId=user_pool_id,
                          ClientId=client_id,
                          AllowedOAuthFlows=['implicit'],
                          AllowedOAuthFlowsUserPoolClient=True,
                          AllowedOAuthScopes=['openid', 'email', 'profile'],
                          SupportedIdentityProviders=['COGNITO'],
                          CallbackURLs=[callback_url],
                          LogoutURLs=[callback_url]
                      )
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(f"Error: {e}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  UpdateCognitoCallbackRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${AWS::StackName}-cognito-callback-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CognitoUpdatePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:UpdateUserPoolClient
                Resource: !GetAtt CognitoUserPool.Arn

  UpdateCognitoCallback:
    Type: Custom::UpdateCognitoCallback
    DependsOn: CloudFrontDistribution
    Properties:
      ServiceToken: !GetAtt UpdateCognitoCallbackFunction.Arn
      UserPoolId: !Ref CognitoUserPool
      ClientId: !Ref CognitoUserPoolClient
      CloudFrontDomain: !GetAtt CloudFrontDistribution.DomainName

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub ${AWS::StackName}-${AWS::AccountId}
      UserPoolId: !Ref CognitoUserPool

  # --------------------------------------------------------------------------
  # CloudFront VPC Origin (connects CloudFront to internal ALB)
  # --------------------------------------------------------------------------
  CloudFrontVpcOrigin:
    Type: AWS::CloudFront::VpcOrigin
    Properties:
      VpcOriginEndpointConfig:
        Name: !Sub ${AWS::StackName}-vpc-origin
        Arn: !Ref ApplicationLoadBalancer
        HTTPPort: 80
        HTTPSPort: 443
        OriginProtocolPolicy: http-only
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-vpc-origin

  # --------------------------------------------------------------------------
  # CloudFront Function (Auth Gate - validates Cognito session)
  # --------------------------------------------------------------------------
  CloudFrontAuthFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub ${AWS::StackName}-auth-gate
      AutoPublish: true
      FunctionConfig:
        Comment: Validates Cognito authentication cookie
        Runtime: cloudfront-js-2.0
      FunctionCode: !Sub |
        function handler(event) {
          var request = event.request;
          var cookies = request.cookies;
          var cognitoDomain = '${AWS::StackName}-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com';
          var clientId = '${CognitoUserPoolClient}';
          var redirectUri = 'https://' + event.context.distributionDomainName + '/';

          // Check for Cognito ID token cookie
          var hasToken = false;
          for (var key in cookies) {
            if (key.indexOf('CognitoIdentityServiceProvider') !== -1 && key.indexOf('idToken') !== -1) {
              hasToken = true;
              break;
            }
          }

          if (!hasToken) {
            var loginUrl = 'https://' + cognitoDomain + '/login?client_id=' + clientId + '&response_type=token&scope=openid+email+profile&redirect_uri=' + encodeURIComponent(redirectUri);
            return {
              statusCode: 302,
              statusDescription: 'Found',
              headers: {
                location: { value: loginUrl }
              }
            };
          }

          return request;
        }

  # --------------------------------------------------------------------------
  # CloudFront Distribution (HTTPS frontend with auth)
  # --------------------------------------------------------------------------
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: CloudFrontVpcOrigin
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub ${AWS::StackName} Shopping Assistant (secured with Cognito)
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          TargetOriginId: alb-vpc-origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
          OriginRequestPolicyId: 216adef6-5c7f-47e4-b989-5492eafa07d3  # AllViewer
        Origins:
          - Id: alb-vpc-origin
            DomainName: !GetAtt ApplicationLoadBalancer.DNSName
            VpcOriginConfig:
              VpcOriginId: !GetAtt CloudFrontVpcOrigin.Id
              OriginReadTimeout: 60
              OriginKeepaliveTimeout: 30
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
          MinimumProtocolVersion: TLSv1.2_2021

# ============================================================================
# Outputs
# ============================================================================
Outputs:
  AppURL:
    Description: HTTPS URL to access the Shopping Assistant (via CloudFront)
    Value: !Sub https://${CloudFrontDistribution.DomainName}

  CloudFrontDistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref CloudFrontDistribution

  CognitoUserPoolId:
    Description: Cognito User Pool ID (create users here)
    Value: !Ref CognitoUserPool

  CognitoLoginURL:
    Description: Cognito Hosted UI login URL
    Value: !Sub https://${AWS::StackName}-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/login?client_id=${CognitoUserPoolClient}&response_type=token&scope=openid+email+profile&redirect_uri=https://${CloudFrontDistribution.DomainName}/

  OpenSearchDomainEndpoint:
    Description: OpenSearch domain endpoint (if created by this stack)
    Value: !If
      - ShouldCreateOpenSearchDomain
      - !GetAtt OpenSearchDomain.DomainEndpoint
      - 'N/A - Using existing domain'

  OpenSearchDomainName:
    Description: OpenSearch domain name
    Value: !Ref OpenSearchDomainName

  OpenSearchAdminUsername:
    Description: OpenSearch admin username (if domain created by this stack)
    Value: !If
      - ShouldCreateOpenSearchDomain
      - !Ref OpenSearchAdminUsername
      - 'N/A - Using existing domain'

  OpenSearchAdminPassword:
    Description: OpenSearch admin password (if domain created by this stack)
    Value: !If
      - ShouldCreateOpenSearchDomain
      - !Ref OpenSearchAdminPassword
      - 'N/A - Using existing domain'

  InstanceId:
    Description: EC2 Instance ID — connect via SSM Session Manager
    Value: !Ref EC2Instance

  SSMConnectCommand:
    Description: AWS CLI command to connect to the instance
    Value: !Sub aws ssm start-session --target ${EC2Instance} --region ${AWS::Region}

  EC2RoleName:
    Description: >
      IAM role name for the EC2 instance. Map this as a backend role for
      ml_full_access and agent-permissions in OpenSearch Dashboards.
    Value: !Ref EC2InstanceRole

  EC2RoleArn:
    Description: IAM role ARN for the EC2 instance
    Value: !GetAtt EC2InstanceRole.Arn

  OpenSearchBedrockEmbeddingRoleName:
    Description: >
      IAM role name for OpenSearch Bedrock Embedding. Map this as a backend role
      for ml_full_access in OpenSearch Dashboards (required before ML connector creation).
    Value: !Ref OpenSearchBedrockEmbeddingRole

  OpenSearchBedrockEmbeddingRoleArn:
    Description: ARN of the OpenSearch Bedrock Embedding role
    Value: !GetAtt OpenSearchBedrockEmbeddingRole.Arn

  AgentCoreExecutionRoleArn:
    Description: >
      After running agentcore.py, map this role as a backend role for
      agent-permissions in OpenSearch Dashboards.
    Value: !Sub arn:aws:iam::${AWS::AccountId}:role/AmazonBedrockAgentCoreSDKRuntime-${AWS::Region}-custom
